# dbt Project Configuration
# For Chronos Data Platform transformations

version: 2

models:
  - name: dim_customers
    description: Customer dimension table
    columns:
      - name: customer_id
        description: Primary key
        tests:
          - unique
          - not_null
      - name: name
        description: Customer name
      - name: email
        description: Customer email
      - name: created_at
        description: Account creation timestamp
      - name: customer_segment
        description: Customer segment classification
      - name: lifetime_value
        description: Total lifetime value

  - name: dim_products
    description: Product dimension table
    columns:
      - name: product_id
        description: Primary key
        tests:
          - unique
          - not_null
      - name: product_name
        description: Product name
      - name: category
        description: Product category
      - name: price
        description: Current price
      - name: is_active
        description: Active status

  - name: fct_orders
    description: Fact table for orders
    columns:
      - name: order_id
        description: Primary key
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to customers
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: order_date
        description: Order date
      - name: total_amount
        description: Order total
      - name: status
        description: Order status
      - name: items_count
        description: Number of items

  - name: fct_transactions
    description: Fact table for transactions
    columns:
      - name: transaction_id
        description: Primary key
        tests:
          - unique
      - name: customer_id
        description: Foreign key
      - name: amount
        description: Transaction amount
      - name: timestamp
        description: Transaction time

  - name: agg_daily_sales
    description: Daily sales aggregation
    columns:
      - name: date
        description: Date
      - name: total_orders
        description: Total orders
      - name: total_revenue
        description: Total revenue
      - name: unique_customers
        description: Unique customers

  - name: agg_customer_metrics
    description: Customer-level aggregations
    columns:
      - name: customer_id
        description: Customer
      - name: total_orders
        description: Total orders
      - name: total_spent
        description: Total amount spent
      - name: avg_order_value
        description: Average order value
      - name: last_order_date
        description: Most recent order
